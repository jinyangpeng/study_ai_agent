# ==================== Nginx 配置 ====================
# 用途：托管 dist/ 静态资源 + SPA fallback + /api 反代到后端 + SSE 友好
# 此文件是模板，启动时由 entrypoint.sh 跑 envsubst 替换 ${BACKEND_UPSTREAM}
# =======================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 开启 gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ---- 静态资源缓存（带 hash 的产物可长缓存） ----
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- 后端 API / AG-UI SSE 反代 ----
    # Vite 构建期 VITE_API_BASE_URL 决定了前端默认 baseURL；
    # 但很多人部署时希望把"前端"和"后端"放同一个域名，访问 /api/* 直接打到后端。
    # 后端真实地址通过环境变量 BACKEND_UPSTREAM 注入（docker-compose 默认为 http://backend:8000）。
    location /api/ {
        proxy_pass         ${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- AG-UI SSE 端点（无 /api 前缀，POST /） ----
    location = / {
        # 只代理 POST（AG-UI run 端点），GET 走前端 index.html
        if ($request_method = POST) {
            proxy_pass         ${BACKEND_UPSTREAM};
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # SSE 关键：禁缓冲、关超时
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            # 透传 Accept 让后端 EventEncoder 选 text/event-stream
            proxy_pass_request_headers on;
            break;
        }

        # 非 POST 的 GET / 走 SPA 入口
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ---- 健康检查 / skeletons 也走反代（GET 方法） ----
    location = /health {
        proxy_pass         ${BACKEND_UPSTREAM}/health;
        proxy_set_header   Host $host;
    }
    location = /skeletons {
        proxy_pass         ${BACKEND_UPSTREAM}/skeletons;
        proxy_set_header   Host $host;
    }

    # ---- SPA fallback：所有未匹配路径回到 index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
